name: PocketPal
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  PocketPal-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PocketPal/Sources/Shared
        excludes:
          - Platform/iOS
          - Platform/macOS
      - path: PocketPal/Sources/Shared/Platform/iOS
    settings:
      base:
        PRODUCT_NAME: PocketPal
        PRODUCT_BUNDLE_IDENTIFIER: com.lumilux.pocketpal.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PocketPal
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: PocketPal imports receipt photos for OCR and review.
        INFOPLIST_KEY_NSCameraUsageDescription: PocketPal uses the camera to scan receipts.
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  PocketPal-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PocketPal/Sources/Shared
        excludes:
          - Platform/iOS
          - Platform/macOS
      - path: PocketPal/Sources/Shared/Platform/macOS
    settings:
      base:
        PRODUCT_NAME: PocketPal
        PRODUCT_BUNDLE_IDENTIFIER: com.lumilux.pocketpal.macos
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PocketPal
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
